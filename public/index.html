<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoBot Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --bg: #080a10;
      --bg-card: rgba(15, 20, 35, 0.8);
      --bg-input: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(99, 102, 241, 0.6);
      --text: #f1f5f9;
      --muted: #64748b;
      --primary: #6366f1;
      --primary-dim: rgba(99, 102, 241, 0.15);
      --green: #10b981;
      --green-dim: rgba(16, 185, 129, 0.12);
      --yellow: #f59e0b;
      --yellow-dim: rgba(245, 158, 11, 0.12);
      --blue: #3b82f6;
      --blue-dim: rgba(59, 130, 246, 0.12);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.12);
      --orange: #f97316;
      --orange-dim: rgba(249, 115, 22, 0.12);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 15% 25%, rgba(99, 102, 241, .12) 0, transparent 50%), radial-gradient(ellipse at 85% 75%, rgba(16, 185, 129, .08) 0, transparent 50%);
      pointer-events: none;
      z-index: -1
    }

    /* ─── Header ─────────────────────────────────────── */
    header {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(8, 10, 16, .9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--primary), var(--green));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      box-shadow: 0 0 18px rgba(99, 102, 241, .4)
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(90deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--green-dim);
      border: 1px solid rgba(16, 185, 129, .25);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--green)
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s ease infinite alternate
    }

    @keyframes pulse {
      0% {
        opacity: .4;
        transform: scale(.9)
      }

      100% {
        opacity: 1;
        transform: scale(1.15)
      }
    }

    /* ─── Layout ──────────────────────────────────────── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      flex: 1;
      min-height: 0
    }

    .left-panel {
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-right: 1px solid var(--border)
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* ─── Profile Bar ─────────────────────────────────── */
    .profile-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap
    }

    .profile-bar label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap
    }

    select.profile-select {
      flex: 1;
      min-width: 140px;
      background: #131826;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: .2s
    }

    select.profile-select:focus {
      outline: none;
      border-color: var(--primary)
    }

    select.profile-select option {
      background: #131826;
      color: var(--text)
    }

    .profile-active-badge {
      background: var(--primary-dim);
      border: 1px solid rgba(99, 102, 241, .3);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--primary)
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99, 102, 241, .3)
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, .45)
    }

    .btn-ghost {
      background: var(--bg-input);
      color: var(--muted);
      border: 1px solid var(--border)
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--muted)
    }

    .btn-danger {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, .25)
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, .25)
    }

    .btn-activate {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, .25)
    }

    .btn-activate:hover {
      background: rgba(16, 185, 129, .25)
    }

    .btn-save-big {
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      color: #fff;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 10px;
      width: 100%;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(99, 102, 241, .35)
    }

    .btn-save-big:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, .5)
    }

    /* ─── Hotkey Group Card ──────────────────────────── */
    .group-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .group-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease;
    }

    .group-header:hover {
      background: rgba(255, 255, 255, 0.04) !important;
    }

    .group-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .group-title {
      font-size: 14px;
      font-weight: 700
    }

    .group-body {
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    /* ─── Field helpers ──────────────────────────────── */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .field label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase
    }

    .field input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      transition: .2s;
      width: 100%
    }

    .field input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .1)
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .range-row input[type=range] {
      flex: 1;
      accent-color: var(--primary);
      cursor: pointer
    }

    .range-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--primary);
      min-width: 60px;
      text-align: right
    }

    /* ─── Dynamic list (FirstStep / BuffSequence) ─────── */
    .dyn-list {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .dyn-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, .02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px
    }

    .dyn-item .field {
      flex: 1
    }

    .dyn-item .field input {
      padding: 6px 10px;
      font-size: 12px
    }

    .dyn-item .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0 2px;
      transition: .2s;
      flex-shrink: 0
    }

    .dyn-item .del-btn:hover {
      color: var(--red)
    }

    .add-row {
      display: flex;
      justify-content: flex-start
    }

    /* ─── Toast ──────────────────────────────────────── */
    .toast-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none
    }

    .toast {
      padding: 10px 16px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0)
    }

    .toast.success {
      background: var(--green-dim);
      border: 1px solid rgba(16, 185, 129, .3);
      color: var(--green)
    }

    .toast.error {
      background: var(--red-dim);
      border: 1px solid rgba(239, 68, 68, .3);
      color: var(--red)
    }

    .toast.info {
      background: var(--primary-dim);
      border: 1px solid rgba(99, 102, 241, .3);
      color: var(--primary)
    }

    /* ─── Right panel ────────────────────────────────── */
    .canvas-card {
      border-bottom: 1px solid var(--border);
      position: relative;
      height: 260px;
      flex-shrink: 0;
      background: #03040a
    }

    #webgl-canvas {
      width: 100%;
      height: 100%;
      display: block
    }

    .canvas-overlay {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(8, 10, 16, .75);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 12px;
      pointer-events: none
    }

    .canvas-overlay p {
      margin-bottom: 3px
    }

    .canvas-overlay p span {
      font-weight: 700;
      color: var(--primary)
    }

    .key-flash {
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .25);
      color: var(--red);
      border-radius: 6px;
      padding: 5px 12px;
      opacity: .4;
      transition: all .2s;
      pointer-events: none
    }

    .key-flash.active {
      opacity: 1;
      box-shadow: 0 0 14px rgba(239, 68, 68, .3)
    }

    .log-panel {
      flex: 1;
      overflow-y: auto;
      padding: 14px
    }

    .log-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .log-item {
      padding: 5px 8px;
      border-radius: 6px;
      background: rgba(255, 255, 255, .02);
      border-left: 3px solid transparent;
      display: grid;
      grid-template-columns: 85px 70px 70px 1fr;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      animation: logIn .2s ease
    }

    @keyframes logIn {
      from {
        opacity: 0;
        transform: translateX(-4px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .log-item.keydown {
      border-left-color: var(--primary)
    }

    .log-item.keyup {
      border-left-color: var(--muted)
    }

    .log-item.click {
      border-left-color: var(--green)
    }

    .log-time {
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace
    }

    .log-type {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 10px
    }

    .log-type.keydown {
      color: var(--primary)
    }

    .log-type.keyup {
      color: var(--muted)
    }

    .log-type.click {
      color: var(--green)
    }

    .log-key {
      background: rgba(255, 255, 255, .07);
      padding: 2px 5px;
      border-radius: 4px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      width: fit-content
    }

    .log-detail {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    /* ─── Modal ──────────────────────────────────────── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: .2s
    }

    .modal-bg.show {
      opacity: 1;
      pointer-events: all
    }

    .modal {
      background: #0f1420;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transform: scale(.95);
      transition: .2s
    }

    .modal-bg.show .modal {
      transform: scale(1)
    }

    .modal h2 {
      font-size: 17px;
      font-weight: 700
    }

    .modal .field input {
      font-size: 14px
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end
    }

    @media(max-width:1024px) {
      .workspace {
        grid-template-columns: 1fr
      }

      .right-panel {
        display: none
      }
    }

    /* ─── Language Switcher ─────────────────────────── */
    .lang-switch {
      display: flex;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px;
      gap: 2px;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
    }

    .lang-btn:hover:not(.active) {
      color: var(--text);
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <div class="logo-icon">C</div>
      <h1 data-i18n="appTitle">AutoBot Control Center</h1>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <div class="lang-switch">
        <button class="lang-btn en" onclick="changeLang('en')">EN</button>
        <button class="lang-btn th" onclick="changeLang('th')">TH</button>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span data-i18n="dashboardLive">Dashboard Live</span>
      </div>
    </div>
  </header>

  <div class="workspace">
    <!-- ════════ LEFT PANEL ════════ -->
    <div class="left-panel">

      <!-- Profile Bar -->
      <div class="profile-bar">
        <div style="display:flex; width:100%; align-items:center; gap:12px; flex-wrap:wrap;">
          <label data-i18n="profile">PROFILE</label>
          <select id="profile-select" class="profile-select" onchange="onProfileSelectChange()"></select>
          <span id="active-profile-badge" class="profile-active-badge">● Active</span>
          <button class="btn btn-activate" onclick="activateProfile()" data-i18n="setActive">✓ Set Active</button>
          <button class="btn btn-ghost" onclick="openNewProfileModal()" data-i18n="newProfileBtn">+ New</button>
          <button class="btn btn-danger" onclick="deleteProfile()" data-i18n="deleteProfileBtn">✕ Delete</button>
        </div>
        <div
          style="display:flex; width:100%; align-items:center; gap:12px; margin-top:10px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">
          <label style="font-size:11px; letter-spacing:0.5px;" data-i18n="targetUrlKeyword">TARGET URL KEYWORD</label>
          <input type="text" id="target-url-keyword" placeholder="e.g. universe.flyff.com"
            style="flex:1; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:6px 12px; color:var(--text); font-family:'Outfit'; font-size:13px; outline:none; height:34px;">
        </div>
        <div
          style="display:flex; width:100%; align-items:center; gap:12px; margin-top:10px; border-top:1px dashed rgba(255,255,255,0.05); padding-top:10px;">
          <label style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); cursor:pointer; font-weight:600;">
            <input type="checkbox" id="enable-overlay-checkbox" style="accent-color:var(--primary); cursor:pointer;" onchange="saveCurrentProfile()">
            <span data-i18n="enableOverlayLabel">Enable Desktop Status Overlay</span>
          </label>
        </div>
        <div
          style="display:flex; width:100%; align-items:center; gap:12px; margin-top:10px; border-top:1px dashed rgba(255,255,255,0.05); padding-top:10px;">
          <label style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); cursor:pointer; font-weight:600;">
            <input type="checkbox" id="ghost-mouse-enabled" style="accent-color:#a855f7; cursor:pointer;" onchange="toggleGhostMouseSettings(); saveCurrentProfile()">
            <span>🖱️ Ghost Mouse Jitter</span>
          </label>
        </div>
        <div id="ghost-mouse-settings" style="display:none; margin-top:8px; padding:10px; background:rgba(168,85,247,0.07); border:1px solid rgba(168,85,247,0.2); border-radius:8px; gap:10px; flex-direction:column;">
          <div style="font-size:11px; color:var(--muted); margin-bottom:4px;">สุ่มขยับเมาส์เล็กน้อยในแท็บเกมเพื่อสร้าง <code>mousemove</code> event ป้องกันการตรวจจับ</div>
          <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
            <label style="font-size:11px; color:var(--muted); display:flex; flex-direction:column; gap:4px;">
              Min Interval (ms)
              <input type="number" id="ghost-mouse-interval-min" min="1000" max="60000" step="500" value="8000"
                style="background:var(--bg-input); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:12px; outline:none; height:28px;"
                onchange="saveCurrentProfile()">
            </label>
            <label style="font-size:11px; color:var(--muted); display:flex; flex-direction:column; gap:4px;">
              Max Interval (ms)
              <input type="number" id="ghost-mouse-interval-max" min="1000" max="120000" step="500" value="25000"
                style="background:var(--bg-input); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:12px; outline:none; height:28px;"
                onchange="saveCurrentProfile()">
            </label>
            <label style="font-size:11px; color:var(--muted); display:flex; flex-direction:column; gap:4px;">
              Max Offset (px)
              <input type="number" id="ghost-mouse-max-offset" min="1" max="100" step="1" value="12"
                style="background:var(--bg-input); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:12px; outline:none; height:28px;"
                onchange="saveCurrentProfile()">
            </label>
          </div>
        </div>
        <div
          style="margin-top:12px; border-top:1px dashed rgba(255,255,255,0.05); padding-top:10px;">
          <label style="font-size:11px; letter-spacing:0.5px; color:var(--muted); font-weight:600;" data-i18n="clientAliasesTitle">CLIENT ALIASES (OPTIONAL)</label>
          <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin-top:6px;">
            <input type="text" id="client-alias-1" placeholder="จอ 1" style="background:var(--bg-input); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:11px; outline:none; text-align:center; height:28px;" onchange="saveCurrentProfile()">
            <input type="text" id="client-alias-2" placeholder="จอ 2" style="background:var(--bg-input); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:11px; outline:none; text-align:center; height:28px;" onchange="saveCurrentProfile()">

    function changeLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      updateLanguageUI();
    }

    function updateLanguageUI() {
      const lang = currentLang;

      // Update elements with data-i18n attribute
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) {
          if (key === 'applySave') {
            el.innerHTML = `💾 ${TRANSLATIONS[lang][key].substring(2)}`;
          } else if (key === 'addCustomAction') {
            el.innerHTML = `➕ ${TRANSLATIONS[lang][key].substring(2)}`;
          } else {
            el.textContent = TRANSLATIONS[lang][key];
          }
        }
      });

      // Update placeholders
      const nameInput = document.getElementById('new-profile-name');
      if (nameInput) {
        nameInput.placeholder = lang === 'en' ? 'e.g. Healer-PvP' : 'เช่น Healer-PvP';
      }

      const urlInput = document.getElementById('target-url-keyword');
      if (urlInput) {
        urlInput.placeholder = lang === 'en' ? 'e.g. universe.flyff.com' : 'เช่น universe.flyff.com';
      }

      // Update dropdown values
      populateProfileDropdowns();

      // Re-render current profile actions
      if (fullConfig.profiles[currentEditProfile]) {
        loadProfileToUI(fullConfig.profiles[currentEditProfile]);
      }

      // Highlight active lang btn
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.classList.contains(lang));
      });
    }

    // ═══════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════
    let fullConfig = { activeProfile: 'Default', profiles: {} };
    let currentEditProfile = 'Default';
    let activeClients = [1];

    // Hotkey & Key List Recording State
    let activeRecordingInput = null;
    let activeRecordingActionId = null;
    let activeRecordingType = null; // 'hotkey', 'single_key', 'comma_keys'

    function startRecordingKey(input, actionId, type) {
      if (activeRecordingInput && activeRecordingInput !== input) {
        stopRecordingKey(activeRecordingInput);
      }
      activeRecordingInput = input;
      activeRecordingActionId = actionId;
      activeRecordingType = type;
      
      input.value = '';
      input.placeholder = type === 'comma_keys' ? 'Press keys sequentially...' : 'Press any key...';
      input.style.borderColor = 'var(--primary)';
      input.style.boxShadow = '0 0 0 3px rgba(99,102,241,0.2)';
      
      window.addEventListener('keydown', handleRecordingKeyDown, true);
    }

    function stopRecordingKey(input) {
      if (activeRecordingInput === input) {
        window.removeEventListener('keydown', handleRecordingKeyDown, true);
        
        let placeholderText = 'Click to bind key...';
        if (activeRecordingType === 'comma_keys') {
          placeholderText = currentLang === 'en' ? 'Click to record...' : 'คลิกเพื่อบันทึก...';
        }
        
        input.placeholder = placeholderText;
        input.style.borderColor = 'var(--border)';
        input.style.boxShadow = 'none';
        
        // Save DOM values to config immediately
        syncActionFromDom(activeRecordingActionId);
        saveCurrentProfile();
        
        activeRecordingInput = null;
        activeRecordingActionId = null;
        activeRecordingType = null;
      }
    }

    function handleRecordingKeyDown(e) {
      if (!activeRecordingInput) return;
      e.preventDefault();
      e.stopPropagation();

      const cleanKey = mapJsKeyToGlobalListenerKey(e);

      // List of restricted / problematic keys that cannot be used as global hotkeys
      const restrictedKeys = [
        'ESCAPE',
        'META', 'LEFT META', 'RIGHT META',
        'CONTEXT MENU', 'SELECT', 'PRINTSCREEN', 'PAUSE'
      ];

      if (restrictedKeys.includes(cleanKey)) {
        const msg = currentLang === 'en'
          ? `⚠️ Key "${cleanKey}" is restricted!`
          : `⚠️ ไม่สามารถใช้ปุ่ม "${cleanKey}" ได้!`;
        toast(msg, 'error');
        activeRecordingInput.blur();
        return;
      }

      if (activeRecordingType === 'hotkey') {
        activeRecordingInput.value = cleanKey;
        const act = fullConfig.profiles[currentEditProfile].actions.find(a => a.id === activeRecordingActionId);
        if (act) {
          act.trigger.value = cleanKey;
        }
        activeRecordingInput.blur();
      } else if (activeRecordingType === 'single_key') {
        activeRecordingInput.value = cleanKey;
        const act = fullConfig.profiles[currentEditProfile].actions.find(a => a.id === activeRecordingActionId);
        if (act) {
          act.targetKey = cleanKey;
        }
        activeRecordingInput.blur();
      } else if (activeRecordingType === 'comma_keys') {
        const currentVal = activeRecordingInput.value.trim();
        if (currentVal === '') {
          activeRecordingInput.value = cleanKey;
        } else {
          const keys = currentVal.split(',').map(s => s.trim());
          if (keys[keys.length - 1] !== cleanKey) {
            activeRecordingInput.value = currentVal + ', ' + cleanKey;
          }
        }
      }
    }

    function mapJsKeyToGlobalListenerKey(e) {
      const code = e.code;
      const key = e.key;

      if (/^F\d+$/.test(key)) {
        return key.toUpperCase();
      }

      // Numpad mapping
      if (code.startsWith('Numpad')) {
        if (code.length === 7) { // Numpad0 - Numpad9
          return 'NUMPAD ' + code.charAt(6);
        }
        if (code === 'NumpadDivide') return 'NUMPAD DIVIDE';
        if (code === 'NumpadMultiply') return 'NUMPAD MULTIPLY';
        if (code === 'NumpadSubtract') return 'NUMPAD MINUS';
        if (code === 'NumpadAdd') return 'NUMPAD PLUS';
        if (code === 'NumpadDecimal') return 'NUMPAD DOT';
        if (code === 'NumpadEnter') return 'NUMPAD ENTER';
      }

      if (code.startsWith('Key')) {
        return code.replace('Key', '').toUpperCase();
      }
      if (code.startsWith('Digit')) {
        return code.replace('Digit', '').toUpperCase();
      }

      // Symbol keys on main keyboard
      const codeSymbolMap = {
        'Minus': 'MINUS',
        'Equal': 'EQUALS',
        'BracketLeft': 'SQUARE BRACKETS OPEN',
        'BracketRight': 'SQUARE BRACKETS CLOSE',
        'Semicolon': 'SEMICOLON',
        'Quote': 'QUOTE',
        'Backquote': 'BACKTICK',
        'Backslash': 'BACKSLASH',
        'Comma': 'COMMA',
        'Period': 'DOT',
        'Slash': 'FORWARD SLASH'
      };

      if (codeSymbolMap[code]) {
        return codeSymbolMap[code];
      }

      const specialMap = {
        ' ': 'SPACE',
        'Spacebar': 'SPACE',
        'Escape': 'ESCAPE',
        'Esc': 'ESCAPE',
        'Insert': 'INSERT',
        'Delete': 'DELETE',
        'Home': 'HOME',
        'End': 'END',
        'PageUp': 'PAGE UP',
        'PageDown': 'PAGE DOWN',
        'ArrowUp': 'ARROW UP',
        'ArrowDown': 'ARROW DOWN',
        'ArrowLeft': 'ARROW LEFT',
        'ArrowRight': 'ARROW RIGHT',
        'Tab': 'TAB',
        'CapsLock': 'CAPS LOCK',
        'Backspace': 'BACKSPACE',
        'Enter': 'ENTER',
        'ShiftLeft': 'LEFT SHIFT',
        'ShiftRight': 'RIGHT SHIFT',
        'ControlLeft': 'LEFT CTRL',
        'ControlRight': 'RIGHT CTRL',
        'AltLeft': 'LEFT ALT',
        'AltRight': 'RIGHT ALT',
        'MetaLeft': 'LEFT META',
        'MetaRight': 'RIGHT META',
        'Shift': 'SHIFT',
        'Control': 'CTRL',
        'Alt': 'ALT',
        'Meta': 'META',
        'ContextMenu': 'CONTEXT MENU',
        'PrintScreen': 'PRINTSCREEN',
        'ScrollLock': 'SCROLL LOCK',
        'Pause': 'PAUSE',
        'NumLock': 'NUM LOCK'
      };

      if (specialMap[code]) {
        return specialMap[code];
      }
      if (specialMap[key]) {
        return specialMap[key];
      }

      return key.toUpperCase();
    }

    // ═══════════════════════════════════════════════════════
    // TOAST
    // ═══════════════════════════════════════════════════════
    function toast(msg, type = 'success') {
      const wrap = document.getElementById('toast-wrap');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      wrap.appendChild(t);
      requestAnimationFrame(() => { requestAnimationFrame(() => { t.classList.add('show'); }); });
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); }, 3000);
    }

    // ═══════════════════════════════════════════════════════
    // RANGE SYNC
    // ═══════════════════════════════════════════════════════
    function syncRange(inputId, rangeId) {
      const v = parseInt(document.getElementById(inputId).value) || 0;
      const r = document.getElementById(rangeId);
      r.value = Math.min(Math.max(v, parseInt(r.min)), parseInt(r.max));
      document.getElementById(rangeId + '-label').textContent = v + 'ms';
    }
    function syncInput(rangeId, inputId) {
      const v = document.getElementById(rangeId).value;
      document.getElementById(inputId).value = v;
      document.getElementById(rangeId + '-label').textContent = v + 'ms';
    }

    // ═══════════════════════════════════════════════════════
    // PROFILE DROPDOWN
    // ═══════════════════════════════════════════════════════
    function populateProfileDropdowns() {
      const names = Object.keys(fullConfig.profiles);

      // Populate profile-select
      const selectEl = document.getElementById('profile-select');
      const prevSel = selectEl.value;
      selectEl.innerHTML = '';
      names.forEach(n => {
        const o = document.createElement('option');
        o.value = n; o.textContent = n;
        selectEl.appendChild(o);
      });
      if (names.includes(prevSel)) selectEl.value = prevSel;
      else selectEl.value = currentEditProfile;

      // Populate copy-from-select
      const copyEl = document.getElementById('copy-from-select');
      const prevCopy = copyEl.value;
      copyEl.innerHTML = '';

      // Default empty option
      const optNone = document.createElement('option');
      optNone.value = '';
      optNone.textContent = TRANSLATIONS[currentLang].emptyProfile;
      copyEl.appendChild(optNone);

      names.forEach(n => {
        const o = document.createElement('option');
        o.value = n; o.textContent = n;
        copyEl.appendChild(o);
      });
      if (prevCopy !== undefined) copyEl.value = prevCopy;

      const badge = document.getElementById('active-profile-badge');
      badge.textContent = '● ' + fullConfig.activeProfile;
      badge.style.display = currentEditProfile === fullConfig.activeProfile ? 'block' : 'block';
      badge.style.opacity = currentEditProfile === fullConfig.activeProfile ? '1' : '0.4';
    }

    function onProfileSelectChange() {
      currentEditProfile = document.getElementById('profile-select').value;
      populateProfileDropdowns();
      loadProfileToUI(fullConfig.profiles[currentEditProfile]);
    }

    // ═══════════════════════════════════════════════════════
    // LOAD PROFILE INTO UI
    // ═══════════════════════════════════════════════════════
    function loadProfileToUI(p) {
      if (!p) return;
      document.getElementById('target-url-keyword').value = p.targetUrlKeyword || 'universe.flyff.com';
      const checkbox = document.getElementById('enable-overlay-checkbox');
      if (checkbox) checkbox.checked = !!p.enableOverlay;

      // Load Ghost Mouse Jitter settings
      const gmj = p.ghostMouseJitter || {};
      const gmEnabled = document.getElementById('ghost-mouse-enabled');
      if (gmEnabled) {
        gmEnabled.checked = !!gmj.enabled;
        toggleGhostMouseSettings();
      }
      const gmMin = document.getElementById('ghost-mouse-interval-min');
      if (gmMin) gmMin.value = gmj.intervalMin || 8000;
      const gmMax = document.getElementById('ghost-mouse-interval-max');
      if (gmMax) gmMax.value = gmj.intervalMax || 25000;
      const gmOffset = document.getElementById('ghost-mouse-max-offset');
      if (gmOffset) gmOffset.value = gmj.maxOffset || 12;

      const aliases = p.clientAliases || {};
      for (let i = 1; i <= 8; i++) {
        const el = document.getElementById(`client-alias-${i}`);
        if (el) el.value = aliases[String(i)] || '';
      }

      if (!p.actions) p.actions = [];
      renderActions(p.actions);
    }

    function escapeHtml(str) {
      if (typeof str !== 'string') return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderActions(actions) {
      const container = document.getElementById('actions-container');
      container.innerHTML = '';

      const colors = ['var(--green)', 'var(--yellow)', 'var(--blue)', 'var(--orange)', 'var(--red)', 'var(--primary)'];

      actions.forEach((act, idx) => {
        const cardColor = colors[idx % colors.length];
        const card = document.createElement('div');
        card.className = 'group-card';
        card.setAttribute('data-id', act.id);
        card.style.borderLeft = `4px solid ${cardColor}`;

        const isExpanded = expandedActions.has(act.id);

        let headerHTML = `
      <div class="group-header" onclick="toggleActionAccordion('${act.id}')" style="display:flex; justify-content:space-between; align-items:center; width:100%; gap: 12px; padding: 10px 16px; cursor:pointer; user-select:none; background:rgba(255,255,255,0.015); transition:background 0.2s;">
        <span class="action-arrow-${act.id}" style="font-size:10px; color:var(--muted); transition:transform 0.2s; transform:rotate(${isExpanded ? '90' : '0'}deg); width:12px; display:inline-block;">▶</span>
        <div class="group-dot" style="background:${cardColor}"></div>
        
        <!-- Editable Name: stop propagation so typing/clicking doesn't fold action -->
        <input type="text" class="action-name-input" value="${escapeHtml(act.name)}" 
          placeholder="${currentLang === 'en' ? 'Action Name' : 'ชื่อคำสั่ง'}" 
          onclick="event.stopPropagation()"
          onchange="saveCurrentProfile()"
          style="background:none; border:none; color:var(--text); font-size:13px; font-weight:700; outline:none; border-bottom:1px dashed rgba(255,255,255,0.15); width:160px; padding-bottom: 2px;">
        
        <!-- Summary details visible even when collapsed -->
        <div class="summary-badges" style="display:flex; align-items:center; gap:8px; font-size:11px; flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; color:var(--muted);">
          <span style="background:var(--primary-dim); border:1px solid rgba(99,102,241,0.2); border-radius:4px; padding:2px 6px; color:var(--primary); font-size:10px; font-weight:700; text-transform:uppercase;">
            ${TRANSLATIONS[currentLang]['mode' + act.mode.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('')] || act.mode}
          </span>
          <span>
            📍 ${act.trigger.type === 'none' ? (currentLang === 'en' ? 'Chain only' : 'Chain เท่านั้น') : `${act.trigger.type === 'keyboard' ? '⌨️' : '🖱️'} ${act.trigger.value || ''}`}
          </span>
          <span>
            🎯 จอ: ${getActionTargetsList(act.targetClient).join(', ')}
          </span>
        </div>

        <div style="display:flex; align-items:center; gap:12px;" onclick="event.stopPropagation()">
          <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); cursor:pointer; font-weight:600;">
            <input type="checkbox" class="action-enabled-checkbox" ${act.enabled ? 'checked' : ''} onchange="saveCurrentProfile()" style="accent-color:var(--primary); cursor:pointer;"> ${TRANSLATIONS[currentLang].enabled}
          </label>
          <button class="btn btn-danger" onclick="deleteAction('${act.id}')" style="padding:4px 8px; font-size:10px; border-radius:6px;">${TRANSLATIONS[currentLang].btnDeleteAction}</button>
        </div>
      </div>
    `;

        let bodyHTML = `
      <div class="group-body" style="padding:${isExpanded ? '18px 20px' : '0'}; max-height:${isExpanded ? '1500px' : '0'}; opacity:${isExpanded ? '1' : '0'}; overflow:hidden; transition: max-height 0.25s ease-out, opacity 0.2s, padding 0.25s ease-out; display:flex; flex-direction:column; gap:14px;">
        <div class="field-row">
          <div class="field">
            <label>${TRANSLATIONS[currentLang].triggerType}</label>
            <select class="action-trigger-type" onchange="onTriggerTypeChange('${act.id}')" style="background:#131826; border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-family:'Outfit'; font-size:13px; cursor:pointer; outline:none;">
              <option value="keyboard" ${act.trigger.type === 'keyboard' ? 'selected' : ''}>${TRANSLATIONS[currentLang].triggerKeyboard}</option>
              <option value="mouse" ${act.trigger.type === 'mouse' ? 'selected' : ''}>${TRANSLATIONS[currentLang].triggerMouse}</option>
              <option value="none" ${(!act.trigger.type || act.trigger.type === 'none') ? 'selected' : ''}>${currentLang === 'en' ? 'None (Chain only)' : 'ไม่มี (Chain เท่านั้น)'}</option>
            </select>
          </div>
          <div class="field">
            <label>${TRANSLATIONS[currentLang].triggerHotkey}</label>
            <div class="trigger-val-container-${act.id}" style="display:flex; width:100%;">
              ${renderTriggerValField(act)}
            </div>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>${TRANSLATIONS[currentLang].actionMode}</label>
            <select class="action-mode" onchange="onModeChange('${act.id}')" style="background:#131826; border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-family:'Outfit'; font-size:13px; cursor:pointer; outline:none; width:100%;">
              <option value="loop" ${act.mode === 'loop' ? 'selected' : ''}>${TRANSLATIONS[currentLang].modeLoop}</option>
              <option value="buff_sequence" ${act.mode === 'buff_sequence' ? 'selected' : ''}>${TRANSLATIONS[currentLang].modeBuff}</option>
              <option value="single_press" ${act.mode === 'single_press' ? 'selected' : ''}>${TRANSLATIONS[currentLang].modeSingle}</option>
              <option value="forward" ${act.mode === 'forward' ? 'selected' : ''}>${TRANSLATIONS[currentLang].modeForward}</option>
              <option value="key_hold" ${act.mode === 'key_hold' ? 'selected' : ''}>${TRANSLATIONS[currentLang].modeHold}</option>

          ${renderModeSpecificFields(act)}

        card.innerHTML = headerHTML + bodyHTML;
        container.appendChild(card);

    }

    // Returns available chain events for a given action mode
    function getChainEventsForMode(mode) {
      const map = {
        loop:          ['onStart', 'onEachCycle', 'onStop'],
        buff_sequence: ['onStart', 'onComplete'],
        single_press:  ['onFired'],
        forward:       ['onKeyDown', 'onActivated', 'onKeyUp'],
        key_hold:      ['onEnable', 'onDisable']
      };
      return map[mode] || [];
    }

    // Track which action chains are expanded (by action id)
    const expandedChains = new Set();
    const expandedActions = new Set(); // Track action accordion state

    function toggleActionAccordion(actionId) {
      const card = document.querySelector(`[data-id="${actionId}"]`);
      if (!card) return;
      const body = card.querySelector('.group-body');
      const arrow = card.querySelector(`.action-arrow-${actionId}`);
      if (!body) return;
      
      const isOpen = expandedActions.has(actionId);
      if (isOpen) {
        expandedActions.delete(actionId);
        body.style.maxHeight = '0';
        body.style.opacity = '0';
        body.style.padding = '0';
        if (arrow) arrow.style.transform = 'rotate(0deg)';
      } else {
        expandedActions.add(actionId);
        body.style.maxHeight = '1500px';
        body.style.opacity = '1';
        body.style.padding = '18px 20px';
        if (arrow) arrow.style.transform = 'rotate(90deg)';
      }
    }

    function toggleChainAccordion(actionId) {
      const panel = document.querySelector(`[data-id="${actionId}"] .chain-body`);
      const arrow = document.querySelector(`[data-id="${actionId}"] .chain-arrow`);
      if (!panel) return;
      const isOpen = expandedChains.has(actionId);
      if (isOpen) {
        expandedChains.delete(actionId);
        panel.style.maxHeight = '0';
        panel.style.opacity = '0';
        if (arrow) arrow.style.transform = 'rotate(0deg)';
      } else {
        expandedChains.add(actionId);
        panel.style.maxHeight = panel.scrollHeight + 'px';
        panel.style.opacity = '1';
        if (arrow) arrow.style.transform = 'rotate(90deg)';
      }
    }

    function renderChainSection(act) {
      const events = getChainEventsForMode(act.mode);
      if (!events.length) return '';

      const chains = act.chaining || {};

      // Count how many chains have targets selected
      const chainedCount = events.reduce((n, ev) => n + (chains[ev] || []).length, 0);

      // Build options for target action dropdown (all OTHER actions)
      const otherActions = collectProfile().actions || [];

      let rows = events.map(ev => {
        const selected = (chains[ev] || []);
        return `
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
            <span style="font-size:11px; color:#a855f7; font-family:'JetBrains Mono'; width:110px; flex-shrink:0;">${ev}</span>
            <select class="chain-target" data-event="${ev}" multiple
              style="flex:1; background:var(--bg-input); border:1px solid rgba(168,85,247,0.3); border-radius:6px; padding:4px 6px; color:var(--text); font-size:11px; min-height:32px; outline:none;"
              onchange="saveCurrentProfile()">
              ${otherActions.filter(a => a.id !== act.id).map(a =>
                `<option value="${a.id}" ${selected.includes(a.id) ? 'selected' : ''}>${escapeHtml(a.name)}</option>`
              ).join('')}
            </select>
          </div>`;
      }).join('');

      const chainEnabled = act.chaining?._enabled === true; // default false
      const isExpanded = expandedChains.has(act.id);
      const badge = chainedCount > 0
        ? `<span style="background:rgba(168,85,247,0.2); color:#a855f7; border-radius:10px; padding:1px 7px; font-size:10px; font-weight:700;">${chainedCount}</span>`
        : '';

      return `
        <div style="border-top:1px dashed rgba(168,85,247,0.25); margin-top:12px; padding-top:10px;">
          <!-- Accordion header -->
          <div style="display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;"
               onclick="toggleChainAccordion('${act.id}')">
            <span class="chain-arrow" style="font-size:12px; color:#a855f7; transition:transform 0.2s; transform:rotate(${isExpanded ? '90' : '0'}deg);">▶</span>
            <span style="font-size:11px; color:#a855f7; font-weight:700; letter-spacing:0.5px;">⛓ ACTION CHAIN</span>
            ${badge}
            <!-- Enable toggle — stopPropagation so click doesn't also expand/collapse -->
            <label style="display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); cursor:pointer; margin-left:auto;" onclick="event.stopPropagation()">
              <input type="checkbox" class="chain-enabled" ${chainEnabled ? 'checked' : ''}
                style="accent-color:#a855f7; cursor:pointer;"
                onchange="const r=this.closest('[data-id]').querySelector('.chain-rows'); r.style.opacity=this.checked?'1':'0.35'; r.style.pointerEvents=this.checked?'':'none'; saveCurrentProfile()">
              ${currentLang === 'en' ? 'Enabled' : 'เปิดใช้'}
            </label>
          </div>
          <!-- Accordion body -->
          <div class="chain-body" style="overflow:hidden; transition:max-height 0.25s ease, opacity 0.2s; max-height:${isExpanded ? '600px' : '0'}; opacity:${isExpanded ? '1' : '0'};">
            <div style="padding-top:10px;">
              <div style="font-size:10px; color:var(--muted); margin-bottom:8px;">เลือก Action ที่จะ Trigger อัตโนมัติเมื่อเกิด event (Ctrl+Click เพื่อเลือกหลายตัว)</div>
              <div class="chain-rows" style="opacity:${chainEnabled ? '1' : '0.35'}; pointer-events:${chainEnabled ? '' : 'none'}; transition:opacity 0.2s;">
                ${rows}
              </div>
            </div>
          </div>
        </div>`;
    }

    function getActionTargetsList(targetClientString) {
      if (!targetClientString) return ['1'];
      if (targetClientString === 'all' || targetClientString === 'both') {
        return ['1','2','3','4','5','6','7','8'];
      }
      return targetClientString.split(',').map(s => s.trim()).filter(Boolean);
    }

    function renderTargetClientSelector(act) {
      const selectedTargets = getActionTargetsList(act.targetClient);
      const isAllSelected = act.targetClient === 'all' || act.targetClient === 'both';
      
      let html = `<div class="client-btn-group" style="display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;">`;
      
      for (let i = 1; i <= 8; i++) {
        const isActive = activeClients.includes(i);
        const isSelected = isAllSelected || selectedTargets.includes(String(i));
        const activeColor = isSelected ? 'var(--primary)' : 'var(--bg-input)';
        const borderColor = isSelected ? 'var(--primary)' : 'var(--border)';
        const textColor = isSelected ? '#fff' : 'var(--muted)';
        const opacity = isActive ? '1' : '0.5';
        const titleText = isActive ? `Client ${i}` : `Client ${i} (Offline)`;
        
        html += `
          <button type="button" class="client-select-btn ${isSelected ? 'selected' : ''}" 
            data-value="${i}"
            title="${titleText}"
            onclick="toggleClientSelection(this, '${act.id}')"
            style="background:${activeColor}; border:1px solid ${borderColor}; color:${textColor}; opacity:${opacity}; width:32px; height:32px; border-radius:50%; font-size:12px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: all 0.2s; outline:none;">
            ${i}
          </button>
        `;
      }
      
      const allActiveColor = isAllSelected ? 'var(--primary)' : 'var(--bg-input)';
      const allBorderColor = isAllSelected ? 'var(--primary)' : 'var(--border)';
      const allTextColor = isAllSelected ? '#fff' : 'var(--muted)';
      html += `
        <button type="button" class="client-select-btn-all ${isAllSelected ? 'selected' : ''}"
          data-value="all"
          onclick="toggleClientSelection(this, '${act.id}')"
          style="background:${allActiveColor}; border:1px solid ${allBorderColor}; color:${allTextColor}; padding:0 12px; height:32px; border-radius:16px; font-size:11px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: all 0.2s; outline:none; text-transform:uppercase;">
          ${TRANSLATIONS[currentLang].allClients || 'All'}
        </button>
      </div>`;
      
      // We also store the actual value in a hidden input for syncActionFromDom
      html += `<input type="hidden" class="action-target-client" value="${escapeHtml(act.targetClient || '1')}">`;
      return html;
    }

    function toggleClientSelection(btn, actionId) {
      const card = document.querySelector(`[data-id="${actionId}"]`);
      if (!card) return;
      const hiddenInput = card.querySelector('.action-target-client');
      if (!hiddenInput) return;
      
      const val = btn.getAttribute('data-value');
      let currentVal = hiddenInput.value;
      
      let targets = [];
      if (currentVal === 'all' || currentVal === 'both') {
        targets = ['1','2','3','4','5','6','7','8'];
      } else {
        targets = currentVal.split(',').map(s => s.trim()).filter(Boolean);
      }
      
      if (val === 'all') {
        if (btn.classList.contains('selected')) {
          hiddenInput.value = '1';
        } else {
          hiddenInput.value = 'all';
        }
      } else {
        if (targets.includes(val)) {
          targets = targets.filter(t => t !== val);
        } else {
          targets.push(val);
        }
        
        targets.sort((a, b) => parseInt(a) - parseInt(b));
        
        if (targets.length === 0) {
          hiddenInput.value = '1';
        } else if (targets.length === 8) {
          hiddenInput.value = 'all';
        } else {
          hiddenInput.value = targets.join(',');
        }
      }
      
      const container = btn.closest('.client-selector-container');
      const act = { id: actionId, targetClient: hiddenInput.value };
      container.innerHTML = `
        <label data-i18n="targetClient">${TRANSLATIONS[currentLang].targetClient}</label>
        ${renderTargetClientSelector(act)}
      `;
      
      saveCurrentProfile();
    }

    function renderTriggerValField(act) {
      if (act.trigger.type === 'mouse') {
        return `
      <select class="action-trigger-val" style="background:#131826; border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-family:'Outfit'; font-size:13px; cursor:pointer; outline:none; width:100%;">
        <option value="4" ${act.trigger.value == '4' ? 'selected' : ''}>${TRANSLATIONS[currentLang].mouseButton4}</option>
        <option value="5" ${act.trigger.value == '5' ? 'selected' : ''}>${TRANSLATIONS[currentLang].mouseButton5}</option>
      </select>
    `;
      } else {
        const placeholderText = activeRecordingActionId === act.id ? TRANSLATIONS[currentLang].pressAnyKey : TRANSLATIONS[currentLang].clickToBind;
        return `
      <input type="text" class="action-trigger-val" value="${escapeHtml(act.trigger.value || '')}" placeholder="${placeholderText}" readonly onfocus="startRecordingKey(this, '${act.id}', 'hotkey')" onblur="stopRecordingKey(this)" style="background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'JetBrains Mono'; font-size:13px; outline:none; width:100%; cursor:pointer; text-align:center;">
    `;
      }
    }

    function renderModeSpecificFields(act) {
      let html = '';
      if (act.mode === 'loop') {
        html = `
      <div style="display:flex; flex-direction:column; gap:12px; border-top:1px dashed var(--border); padding-top:12px;">
        <div class="field-row">
          <div class="field">
            <label>${TRANSLATIONS[currentLang].loopKeysLabel}</label>
            <input type="text" class="loop-keys" value="${escapeHtml((act.keys || []).join(', '))}" placeholder="${currentLang === 'en' ? 'Click to record...' : 'คลิกเพื่อบันทึก...'}" readonly onfocus="startRecordingKey(this, '${act.id}', 'comma_keys')" onblur="stopRecordingKey(this)" style="background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'JetBrains Mono'; font-size:13px; outline:none; cursor:pointer;">
          </div>
          <div class="field">
            <label>${TRANSLATIONS[currentLang].loopJitterLabel}</label>
            <input type="number" class="loop-jitter" value="${act.jitter ?? 250}" min="0" placeholder="e.g. 250" style="background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'JetBrains Mono'; font-size:13px; outline:none;">
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>${TRANSLATIONS[currentLang].loopIntervalLabel}</label>
            <input type="number" class="loop-interval" id="interval-input-${act.id}" value="${act.interval ?? 3000}" min="100" step="100" oninput="syncRange('interval-input-${act.id}', 'interval-range-${act.id}')" style="background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'JetBrains Mono'; font-size:13px; outline:none;">
          </div>
          <div class="field">
            <label>${TRANSLATIONS[currentLang].loopQuickAdjust}</label>
            <div class="range-row">

      } else if (act.mode === 'buff_sequence') {

        <div class="field">
          <label>${TRANSLATIONS[currentLang].buffKeysLabel}</label>

        </div>
      </div>
    `;
      } else if (act.mode === 'single_press') {
        html = `
      <div style="display:flex; flex-direction:column; gap:12px; border-top:1px dashed var(--border); padding-top:12px;">
        <div class="field">
          <label>${TRANSLATIONS[currentLang].singleKeysLabel}</label>
          <input type="text" class="single-keys" value="${escapeHtml((act.keys || []).join(', '))}" placeholder="${currentLang === 'en' ? 'Click to record...' : 'คลิกเพื่อบันทึก...'}" readonly onfocus="startRecordingKey(this, '${act.id}', 'comma_keys')" onblur="stopRecordingKey(this)" style="background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'JetBrains Mono'; font-size:13px; outline:none; cursor:pointer;">
        </div>
      </div>
    `;
      } else if (act.mode === 'forward') {
        const isDelayEnabled = !!act.delayActivation;
        html = `
      <div style="display:flex; flex-direction:column; gap:12px; border-top:1px dashed var(--border); padding-top:12px;">
        <div class="field">
          <label>${TRANSLATIONS[currentLang].forwardTargetKeyLabel}</label>
          <input type="text" class="forward-target-key" value="${escapeHtml(act.targetKey || '5')}" placeholder="${currentLang === 'en' ? 'Click to record...' : 'คลิกเพื่อบันทึก...'}" readonly onfocus="startRecordingKey(this, '${act.id}', 'single_key')" onblur="stopRecordingKey(this)" style="background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'JetBrains Mono'; font-size:13px; outline:none; text-align:center; cursor:pointer;">
        </div>
        <div style="display:flex; flex-direction:column; gap:8px; margin-top:4px;">
          <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text); cursor:pointer;">
            <input type="checkbox" class="forward-delay-activation" ${isDelayEnabled ? 'checked' : ''} onchange="toggleForwardDelayDisplay('${act.id}', this.checked)" style="accent-color:var(--primary); cursor:pointer;">
            ${TRANSLATIONS[currentLang].forwardDelayActivationLabel}
          </label>
          <div class="forward-delay-ms-container-${act.id}" style="display:${isDelayEnabled ? 'flex' : 'none'}; flex-direction:column; gap:4px; margin-top:2px;">
            <label style="font-size:11px; color:var(--muted);">${TRANSLATIONS[currentLang].forwardActivationDelayMsLabel}</label>
            <input type="number" class="forward-activation-delay-ms" value="${act.activationDelayMs ?? 1000}" min="100" step="100" placeholder="1000" style="background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-family:'JetBrains Mono'; font-size:13px; outline:none; width: 120px;">
          </div>
        </div>
      </div>
    `;
      } else if (act.mode === 'key_hold') {
        html = `
      <div style="display:flex; flex-direction:column; gap:12px; border-top:1px dashed var(--border); padding-top:12px;">
        <div class="field">
          <label>${TRANSLATIONS[currentLang].holdTargetKeyLabel}</label>
          <input type="text" class="hold-target-key" value="${escapeHtml(act.targetKey || '1')}" placeholder="${currentLang === 'en' ? 'Click to record...' : 'คลิกเพื่อบันทึก...'}" readonly onfocus="startRecordingKey(this, '${act.id}', 'single_key')" onblur="stopRecordingKey(this)" style="background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'JetBrains Mono'; font-size:13px; outline:none; text-align:center; cursor:pointer;">
        </div>
      </div>
    `;
      }
      return html;
